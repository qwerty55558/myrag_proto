syntax = "proto3";

package rag;

option java_package = "me.clauminirockpt.myrag_proto";
option java_multiple_files = true;

service RagService {
  // 질문에 대해 토큰 단위로 스트리밍 응답
  rpc Query (QueryRequest) returns (stream QueryResponse);

  // Google Drive 폴더 동기화 트리거
  rpc Sync (SyncRequest) returns (SyncResponse);
}

message QueryRequest {
  string question = 1;
  int32 k = 2;  // 검색할 문서 청크 수 (기본 4)
}

message QueryResponse {
  string token = 1;           // 스트리밍 토큰 한 조각
  bool is_final = 2;          // 마지막 청크 여부
  repeated string sources = 3; // is_final=true 일 때만 포함
}

message SyncRequest {
  string drive_folder_id = 1;
}

message SyncResponse {
  int32 document_count = 1;
  string message = 2;
}
