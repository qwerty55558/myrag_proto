syntax = "proto3";

package myrag.v1;

import "google/protobuf/timestamp.proto";

option java_package = "me.clauminirockpt.myrag_proto.v1";
option java_multiple_files = true;

// RAG 검색 + 문서 인덱싱 서비스
service RagService {
  // 질문에 대해 토큰 단위로 스트리밍 응답
  rpc Chat (ChatRequest) returns (stream ChatResponse);

  // Google Drive 문서 인덱싱 트리거
  rpc IndexDocuments (IndexDocumentsRequest) returns (IndexDocumentsResponse);
}

message ChatRequest {
  string query = 1;
  google.protobuf.Timestamp current_timestamp = 2;
  int32 k = 3;
  string session_id = 4;
  string user_id = 5;
  string access_token = 6;
}

message ChatResponse {
  string token = 1;
  bool is_final = 2;
  repeated SourceDocument sources = 3;
}

message SourceDocument {
  string title = 1;
  string uri = 2;
  float score = 3;
}

message IndexDocumentsRequest {
  string drive_folder_id = 1;
  string access_token = 2;
}

message IndexDocumentsResponse {
  int32 chunk_count = 1;
  repeated string files = 2;
  string message = 3;
}
